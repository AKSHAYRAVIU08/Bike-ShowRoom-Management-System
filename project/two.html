<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<body>
     <div class="container">
        <form method="post">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div>
                {{message}}
            </div>
            {% endfor %}
            {% endif %}
            <h1 style="color: teal;">LOGIN PAGE</h1>
            <p><b style="color: blueviolet;">LOGIN FACILITY AVAILABLE FOR NEW CUSTOMERS</b></p>
            <label for="username" style="color: steelblue;"><b>USERNAME</b></label><br><br>
            <input type="username" id="username" name="username"><br><br>
            <label for="password" style="color: steelblue;"><b>PASSWORD</b></label><br><br>
            <input type="password" id="password" name="password"><br><br>
            <button type="submit" class="btn btn-info"><b>LOGIN</b></button>
        </form>
    </div>
</body>
</html>
