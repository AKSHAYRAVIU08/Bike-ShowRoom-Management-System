<!DOCTYPE html>
<html>
<head>
<title>Document</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>🏍️ Alinas Bike Showroom Receipt</h2>

<div class="form">

<label>Customer Name</label>
<input type="text" id="customer">

<label>Bike Model</label>
<input type="text" id="bike">

<label>Bike Price</label>
<input type="number" id="price">

<label>GST (%)</label>
<input type="number" id="gst">

<button onclick="generateReceipt()">Generate Receipt</button>

</div>


<div id="receipt" class="receipt">

<h3>BIKE WORLD SHOWROOM</h3>
<p>Invoice No: <span id="invoice"></span></p>
<hr>

<p>Customer:
<b><span id="rCustomer"></span></b>
</p>

<p>Bike Model:
<b><span id="rBike"></span></b>
</p>

<p>Price:
₹ <span id="rPrice"></span>
</p>

<p>GST:
₹ <span id="rGst"></span>
</p>

<hr>

<h3>
Total Amount:
₹ <span id="total"></span>
</h3>

<p class="thanks">
Thank you for visiting!
</p>

<button onclick="window.print()">Print Receipt</button>

</div>

</div>


<script src="script.js"></script>

<style>
    body{
    font-family: Arial;
    background:#f2f2f2;
}


.container{
    width:450px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}


h2{
    text-align:center;
    color:#d35400;
}


label{
    display:block;
    margin-top:10px;
}


input{
    width:100%;
    padding:8px;
    margin-top:5px;
}


button{
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#e67e22;
    color:white;
    border:none;
    cursor:pointer;
}


.receipt{
    margin-top:25px;
    padding:20px;
    border:2px dashed #555;
    display:none;
}


.receipt h3{
    text-align:center;
}


.thanks{
    text-align:center;
    color:green;
}
</style>

<script>
    function generateReceipt(){

    let customer =
    document.getElementById("customer").value;

    let bike =
    document.getElementById("bike").value;

    let price =
    Number(document.getElementById("price").value);

    let gst =
    Number(document.getElementById("gst").value);


    let gstAmount = price * gst / 100;

    let total = price + gstAmount;


    document.getElementById("invoice").innerHTML =
    Math.floor(Math.random()*100000);


    document.getElementById("rCustomer").innerHTML =
    customer;


    document.getElementById("rBike").innerHTML =
    bike;


    document.getElementById("rPrice").innerHTML =
    price;


    document.getElementById("rGst").innerHTML =
    gstAmount;


    document.getElementById("total").innerHTML =
    total;


    document.getElementById("receipt").style.display="block";

}
</script>

</body>
</html>
