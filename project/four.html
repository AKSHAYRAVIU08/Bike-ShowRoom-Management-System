<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<body>
    <div class="container">
        <form method="post">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div>
                {{message}}
            </div>
            {% endfor %}
            {% endif %}
            <h1 style="color: yellow;">ALINA'S BIKE SHOWROOM FORM</h1>
            <p><b style="color: brown;">PLEASE FILL THE BELOW FORM</b></p>
            <label for="customer_name" style="color: red;"><b>CUSTOMER NAME</b></label><br><br>
            <input type="customer_name" id="customer_name" name="customer_name"><br><br>
            <label for="district" style="color: red;"><b>DISTRICT</b></label><br><br>
            <input type="district" id="district" name="district"><br><br>
            <label for="purpose" style="color: red;"><b>PURPOSE</b></label><br><br>
            <input type="purpose" id="purpose" name="purpose"><br><br>
            <button type="submit" class="btn btn-warning"><b style="color: white;">SHARE</b></button>
        </form>
    </div>
</body>
</html>
