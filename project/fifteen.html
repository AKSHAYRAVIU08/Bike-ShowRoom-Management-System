<!DOCTYPE html>
<html>
<head>
    <title>Document</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f2f2f2;
            padding: 30px;
        }

        .table-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: red;
        }
    </style>

</head>

<body>
{% load static %}
<div class="container">

    <div class="table-box">

        <h2>VIEW BOOKING</h2>

        <table class="table table-bordered table-striped table-hover">

            <thead class="thead-dark">
                <tr>
                    <th>Bike</th>
                    <th>Model</th>
                    <th>Gear</th>
                    <th>Mileage</th>
                    <th>Price</th>
                    <th>Reciept</th>
                    <th>Payment</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td><img src="{% static 'bullet.jpg' %}" alt=" bike images" width="250px" height="250px"></td>
                    <td><b>Classic 350</b></td>
                    <td><b>5 Gear Box</b></td>
                    <td><b>35--37 kmpl</b></td>
                    <td><b>2,00,000--3,65,000</b></td>
                    <td><a href="/sixteen" class="btn btn-danger"><b>View Reciept</b></a></td>
                    <td><a href="/payment" class="btn btn-info"><b>Purchase</b></a></td>
                </tr>
            </tbody>

        </table>

    </div>

</div>


</body>
</html>
