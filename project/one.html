<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<body>
    <div class="container">
        <form method="post">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div>
                {{message}}
            </div>
            {% endfor %}
            {% endif %}
            <h1 style="color: violet;">BIKE SHOWROOM MANAGEMENT SYSTEM</h1>
            <p><b style="color: brown;">REGISTRATION FACILITY AVAILABLE FOR NEW USERS</b></p>
            <label for="username" style="color: red;"><b>USERNAME</b></label><br><br>
            <input type="username" id="username" name="username"><br><br>
            <label for="email" style="color: red;"><b>EMAIL ID</b></label><br><br>
            <input type="email" id="email" name="email"><br><br>
            <label for="password" style="color: red;"><b>PASSWORD</b></label><br><br>
            <input type="password" id="password" name="password"><br><br>
            <button type="submit" class="btn btn-dark"><b>REGISTER</b></button><br><br>
            <a href="/three" class="btn btn-primary"><b>VISITED USERS</b></a>
        </form>
    </div>
</body>
</html>
